# LiveKit server config for local JARVIS voice agent.
# Single-node, single-port-multiplexed setup — simplest possible.
# Clients (Tauri webview, Android app on the LAN) connect to :7880 for
# WebSocket signaling; media flows over UDP :7882 (multiplexed via TURN
# fallback on TCP :7881 if UDP is blocked).
#
# Keys live outside the repo at ~/.jarvis/livekit-keys.yaml (chmod 600).
# Rotate with `./livekit-server.bin generate-keys` and overwrite that
# file. Keep this yaml committable — never reintroduce a `keys:` block.

port: 7880
# Localhost-only bind. The Tauri webview, voice-agent, and voice-client
# all connect to ws://127.0.0.1:7880 — no LAN exposure today. Add a LAN
# IP here (or remove to listen on all interfaces) when wiring an Android
# client over Tailscale or LAN.
bind_addresses:
  - 127.0.0.1
log_level: info
key_file: /home/ulrich/.jarvis/livekit-keys.yaml

rtc:
  # TCP fallback for media (used when UDP is blocked by NAT or by
  # browser WebRTC when it decides to prefer TCP).
  tcp_port: 7881
  # Single UDP port for all media — LiveKit's SFU multiplexes all
  # peer connections through here. No 50000-60000 range required on
  # modern LiveKit (1.7+). Phone-on-cellular later will need either
  # use_external_ip: true + port-forward, or a TURN server.
  udp_port: 7882
  # Don't advertise external IPs — this is a LAN-only deployment for
  # now. When we add WAN (Tailscale / Wireguard), this flips to true
  # and we add stun_servers.
  use_external_ip: false

# API keypair lives in the `key_file` referenced above so this yaml can
# be committed without leaking secrets. The agent + every client read
# LIVEKIT_API_KEY / LIVEKIT_API_SECRET from src/voice-agent/.env (also
# gitignored) and must match the keyfile entries.
