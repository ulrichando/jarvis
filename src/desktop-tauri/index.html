<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>J.A.R.V.I.S.</title>
    <style>
      /* WebKitGTK ghost-frame fix per tauri#12800 / #13157 / #14924:
         a 1% baseline on <html> gives WebKit's compositor a non-null
         pixel to invalidate against. Without this, transparent overlay
         windows leak old frames as "after-images" when subpanels
         scroll or remount. Effectively invisible (0.01 alpha) but
         enough to make the dirty-rect tracking work. */
      html {
        margin: 0; padding: 0;
        background: rgba(0,0,0,0.01) !important;
        color: #b0c8d4;
        overflow: hidden;
        width: 100vw; height: 100vh;
      }
      body, #root {
        margin: 0; padding: 0;
        background: transparent !important;
        color: #b0c8d4;
        overflow: hidden;
        width: 100vw; height: 100vh;
      }
    </style>
    <script>
      /* Kiosk route is an OPAQUE window; without this its first paint is the
         webview default (white) until React mounts and applies the black
         backdrop — a visible white flash before the face streams in. Paint
         opaque black immediately (head runs before body), only for kiosk so
         the transparent main overlay stays transparent. */
      if (location.search.indexOf('route=kiosk') !== -1) {
        var s = document.createElement('style');
        s.textContent = 'html,body,#root{background:#000 !important}';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="__err" style="position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(120,0,0,0.95);color:#fff;padding:10px 14px;font:12px ui-monospace,monospace;white-space:pre-wrap;max-height:40vh;overflow:auto;border-radius:8px;display:none;pointer-events:auto;"></div>
    <script>
      (function () {
        var el = document.getElementById('__err');
        function show(s) { el.style.display = 'block'; el.textContent += s + '\n'; }
        window.addEventListener('error', function (e) {
          show('ERROR ' + (e.message || e.error) + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show('REJECT ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
