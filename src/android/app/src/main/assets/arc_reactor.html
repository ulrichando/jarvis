<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script>
/**
 * JARVIS Holographic Sphere — Age of Ultron style
 * Identical to the desktop ArcReactor.jsx, translated to vanilla Three.js.
 *
 * Android bridge API:
 *   window.setJarvisState(state: string, audioLevel: number)
 *   state ∈ { 'idle', 'listening', 'thinking', 'speaking', 'offline', 'booting', 'ready' }
 *   audioLevel ∈ [0, 1]
 */
window.addEventListener('load', function () {
  if (typeof THREE === 'undefined') {
    document.body.innerHTML = '<p style="color:#f87171;padding:16px">Three.js failed to load — check network.</p>';
    return;
  }

  // ── Android bridge state ──────────────────────────────────────────────────
  let _state      = 'idle';
  let _audioLevel = 0;
  window.setJarvisState = function (state, audioLevel) {
    _state      = state;
    _audioLevel = parseFloat(audioLevel) || 0;
  };

  // ── Theme ─────────────────────────────────────────────────────────────────
  const hexToInt = (hex) => parseInt(hex.replace('#', ''), 16);
  const primaryInt = hexToInt('#00b8d4');
  const glowInt    = hexToInt('#00e5ff');
  const pr = (primaryInt >> 16) & 0xff;
  const pg = (primaryInt >>  8) & 0xff;
  const pb =  primaryInt        & 0xff;
  const structInt = (
    (Math.min(255, pr + 60) << 16) |
    (Math.min(255, pg + 60) <<  8) |
     Math.min(255, pb + 60)
  );

  // ── Scene / camera / renderer ─────────────────────────────────────────────
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  // Use the smaller dimension so the sphere fills the square WebView tightly
  // on any screen density. Factor 0.20 → sphere occupies ~85 % of the view.
  const getCamZ = () => {
    const dim = Math.min(window.innerWidth, window.innerHeight);
    return 10 * (dim * 0.20 / 280);
  };
  camera.position.z = getCamZ();
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, premultipliedAlpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  renderer.domElement.style.cssText =
    'position:fixed;inset:0;width:100%;height:100%;background:transparent;';
  document.body.appendChild(renderer.domElement);

  const globe = new THREE.Group();
  scene.add(globe);
  const R = 1.3;

  const themedMaterials = [];
  const lineMat = (opacity) => {
    const m = new THREE.LineBasicMaterial({
      color: structInt, transparent: true, opacity,
      blending: THREE.NormalBlending, depthWrite: false, linewidth: 1.5,
    });
    themedMaterials.push({ mat: m, role: 'struct' });
    return m;
  };

  // ── Puzzle-piece rings ────────────────────────────────────────────────────
  const cellMeshes  = [];
  const puzzleRings = [
    { phi: 0.30, segs:  4, dPhi: 0.18 },
    { phi: 0.55, segs:  6, dPhi: 0.18 },
    { phi: 0.80, segs:  8, dPhi: 0.18 },
    { phi: 1.05, segs: 10, dPhi: 0.18 },
    { phi: 1.30, segs: 12, dPhi: 0.18 },
    { phi: 1.55, segs: 14, dPhi: 0.18 },
    { phi: 1.80, segs: 10, dPhi: 0.18 },
    { phi: 2.05, segs:  8, dPhi: 0.18 },
    { phi: 2.30, segs:  6, dPhi: 0.18 },
    { phi: 2.55, segs:  4, dPhi: 0.18 },
  ];
  const gapAngle = 0.08, arcRes = 6, phiRes = 3, puzzleR = R * 1.01;

  puzzleRings.forEach((ring, ringI) => {
    const segAngle = (Math.PI * 2) / ring.segs;
    for (let s = 0; s < ring.segs; s++) {
      const theta0 = s * segAngle + gapAngle / 2;
      const theta1 = (s + 1) * segAngle - gapAngle / 2;
      const phi0   = ring.phi - ring.dPhi / 2;
      const phi1   = ring.phi + ring.dPhi / 2;

      // Mesh geometry
      const positions = [], indices = [];
      for (let pi = 0; pi <= phiRes; pi++) {
        for (let ti = 0; ti <= arcRes; ti++) {
          const ph = phi0   + (pi / phiRes) * (phi1 - phi0);
          const th = theta0 + (ti / arcRes) * (theta1 - theta0);
          positions.push(
            puzzleR * Math.sin(ph) * Math.cos(th),
            puzzleR * Math.cos(ph),
            puzzleR * Math.sin(ph) * Math.sin(th),
          );
        }
      }
      for (let pi = 0; pi < phiRes; pi++) {
        for (let ti = 0; ti < arcRes; ti++) {
          const a = pi * (arcRes + 1) + ti, b = a + 1, c = a + arcRes + 1, d = c + 1;
          indices.push(a, c, b, b, c, d);
        }
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();

      // Glowing edge outline
      const edgePts = [];
      for (let ti = 0; ti <= arcRes; ti++) {
        const th = theta0 + (ti / arcRes) * (theta1 - theta0);
        edgePts.push(new THREE.Vector3(
          puzzleR * Math.sin(phi0) * Math.cos(th), puzzleR * Math.cos(phi0), puzzleR * Math.sin(phi0) * Math.sin(th)));
      }
      for (let pi = 0; pi <= phiRes; pi++) {
        const ph = phi0 + (pi / phiRes) * (phi1 - phi0);
        edgePts.push(new THREE.Vector3(
          puzzleR * Math.sin(ph) * Math.cos(theta1), puzzleR * Math.cos(ph), puzzleR * Math.sin(ph) * Math.sin(theta1)));
      }
      for (let ti = arcRes; ti >= 0; ti--) {
        const th = theta0 + (ti / arcRes) * (theta1 - theta0);
        edgePts.push(new THREE.Vector3(
          puzzleR * Math.sin(phi1) * Math.cos(th), puzzleR * Math.cos(phi1), puzzleR * Math.sin(phi1) * Math.sin(th)));
      }
      for (let pi = phiRes; pi >= 0; pi--) {
        const ph = phi0 + (pi / phiRes) * (phi1 - phi0);
        edgePts.push(new THREE.Vector3(
          puzzleR * Math.sin(ph) * Math.cos(theta0), puzzleR * Math.cos(ph), puzzleR * Math.sin(ph) * Math.sin(theta0)));
      }
      edgePts.push(edgePts[0].clone());

      const edgeMat = new THREE.LineBasicMaterial({
        color: glowInt, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending,
      });
      themedMaterials.push({ mat: edgeMat, role: 'glow' });
      globe.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(edgePts), edgeMat));

      const mat = new THREE.MeshBasicMaterial({
        color: primaryInt, transparent: true, opacity: 0.08,
        side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
      });
      themedMaterials.push({ mat, role: 'glow' });

      const piece     = new THREE.Group();
      piece.add(new THREE.Mesh(geo, mat));
      const midPhi    = (phi0 + phi1) / 2;
      const midTheta  = (theta0 + theta1) / 2;
      const normal    = new THREE.Vector3(
        Math.sin(midPhi) * Math.cos(midTheta),
        Math.cos(midPhi),
        Math.sin(midPhi) * Math.sin(midTheta),
      ).normalize();
      piece.userData = { phase: Math.random() * Math.PI * 2, ringIdx: ringI, normal, mat };
      globe.add(piece);
      cellMeshes.push(piece);
    }
  });

  // ── Circuit lines ─────────────────────────────────────────────────────────
  for (let i = 0; i < 80; i++) {
    const pts   = [];
    let theta   = Math.random() * Math.PI * 2;
    let phi     = Math.acos(2 * Math.random() - 1);
    const steps = 3 + Math.floor(Math.random() * 8);
    const layer = R * (0.85 + Math.random() * 0.2);
    for (let j = 0; j < steps; j++) {
      pts.push(new THREE.Vector3(
        layer * Math.sin(phi) * Math.cos(theta),
        layer * Math.cos(phi),
        layer * Math.sin(phi) * Math.sin(theta),
      ));
      if (Math.random() > 0.5) {
        theta += (Math.random() - 0.5) * 0.3;
      } else {
        phi += (Math.random() - 0.5) * 0.2;
        phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));
      }
    }
    globe.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      lineMat(0.3 + Math.random() * 0.15),
    ));
  }

  // ── Energy lines ──────────────────────────────────────────────────────────
  for (let i = 0; i < 20; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const pts   = [];
    for (let j = 0; j < 6; j++) {
      const r = (j / 5) * R;
      pts.push(new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta),
      ));
    }
    globe.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      lineMat(0.3 + Math.random() * 0.15),
    ));
  }

  // ── Orbital bands ─────────────────────────────────────────────────────────
  const bands = [];
  for (let b = 0; b < 5; b++) {
    const bandR = R + 0.02 + b * 0.01;
    const pts   = [];
    for (let j = 0; j <= 128; j++) {
      const a       = (j / 128) * Math.PI * 2;
      const wobbleY = 0.04 * Math.sin(a * (2 + b) + b * 0.7);
      pts.push(new THREE.Vector3(bandR * Math.cos(a), wobbleY, bandR * Math.sin(a)));
    }
    const band = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      lineMat(0.3 + Math.random() * 0.2),
    );
    band.rotation.x = b * 0.45 + Math.random() * 0.3;
    band.rotation.y = b * 0.2;
    band.rotation.z = b * 0.35 - 0.3;
    bands.push(band);
    globe.add(band);
  }

  // ── Eye rings ─────────────────────────────────────────────────────────────
  const eyeRings   = [];
  const eyeConfigs = [
    { radius: 0.20, tube: 0.008, tilt: { x:  0.30, y:  0.0,  z:  0.20 } },
    { radius: 0.28, tube: 0.010, tilt: { x: -0.40, y:  0.5,  z: -0.10 } },
    { radius: 0.36, tube: 0.012, tilt: { x:  0.15, y: -0.3,  z:  0.40 } },
    { radius: 0.44, tube: 0.010, tilt: { x: -0.20, y:  0.4,  z: -0.30 } },
    { radius: 0.52, tube: 0.008, tilt: { x:  0.50, y: -0.2,  z:  0.15 } },
  ];
  eyeConfigs.forEach((cfg) => {
    const torusGeo = new THREE.TorusGeometry(cfg.radius, cfg.tube, 8, 64);
    const torusMat = new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide,
    });
    themedMaterials.push({ mat: torusMat, role: 'glow' });
    const ring = new THREE.Mesh(torusGeo, torusMat);
    ring.rotation.x = cfg.tilt.x;
    ring.rotation.y = cfg.tilt.y;
    ring.rotation.z = cfg.tilt.z;
    globe.add(ring);
    eyeRings.push(ring);
  });

  // ── Scanning ring ─────────────────────────────────────────────────────────
  const scanRingGeo = new THREE.TorusGeometry(R * 1.05, 0.006, 4, 80);
  const scanRingMat = new THREE.MeshBasicMaterial({
    color: 0xfbbf24, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const scanRing = new THREE.Mesh(scanRingGeo, scanRingMat);
  globe.add(scanRing);

  // ── Spark particles ───────────────────────────────────────────────────────
  const SPARK_N      = 5000;
  const sparkPos     = new Float32Array(SPARK_N * 3);
  const sparkPhases  = new Float32Array(SPARK_N);
  const sparkBase    = new Float32Array(SPARK_N * 3);
  const sparkNormals = new Float32Array(SPARK_N * 3);
  for (let i = 0; i < SPARK_N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = R * (0.4 + Math.random() * 0.8);
    const x     = r * Math.sin(phi) * Math.cos(theta);
    const y     = r * Math.sin(phi) * Math.sin(theta);
    const z     = r * Math.cos(phi);
    const idx   = i * 3;
    sparkPos[idx]   = x; sparkPos[idx+1]   = y; sparkPos[idx+2]   = z;
    sparkBase[idx]  = x; sparkBase[idx+1]  = y; sparkBase[idx+2]  = z;
    sparkNormals[idx]   = Math.sin(phi) * Math.cos(theta);
    sparkNormals[idx+1] = Math.sin(phi) * Math.sin(theta);
    sparkNormals[idx+2] = Math.cos(phi);
    sparkPhases[i] = Math.random() * Math.PI * 2;
  }
  const sparkGeo = new THREE.BufferGeometry();
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  const sparkMat = new THREE.PointsMaterial({
    size: 0.012, color: primaryInt, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  globe.add(new THREE.Points(sparkGeo, sparkMat));

  // ── Neural arcs ───────────────────────────────────────────────────────────
  const NEURAL_LINES = 80;
  const signals      = [];
  for (let i = 0; i < NEURAL_LINES; i++) {
    const tiltX       = Math.random() * Math.PI;
    const tiltZ       = Math.random() * Math.PI;
    const tiltY       = Math.random() * Math.PI * 0.5;
    const orbitR      = R * (0.3 + Math.random() * 0.65);
    const speed       = (1.0 + Math.random() * 2.0) * (Math.random() > 0.5 ? 1 : -1);
    const arcLen      = 0.4 + Math.random() * 1.2;
    const segs        = 20 + Math.floor(Math.random() * 20);
    const positions   = new Float32Array(segs * 3);
    const geo         = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const brightness  = 0.15 + Math.random() * 0.35;
    const neuralColor = i % 5 === 0 ? glowInt : i % 3 === 0 ? primaryInt : structInt;
    const mat = new THREE.LineBasicMaterial({
      color: neuralColor, transparent: true, opacity: brightness,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    themedMaterials.push({ mat, role: i % 5 === 0 ? 'glow' : 'struct' });
    globe.add(new THREE.Line(geo, mat));
    signals.push({ angle: Math.random() * Math.PI * 2, tiltX, tiltZ, tiltY, orbitR, speed, arcLen, segs, positions, geo, mat, baseBrightness: brightness });
  }

  // ── Center glow sprite ────────────────────────────────────────────────────
  const glowTex = (() => {
    const size = 128, c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx  = c.getContext('2d');
    const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    const gr   = (glowInt >> 16) & 0xff;
    const gg   = (glowInt >>  8) & 0xff;
    const gb   =  glowInt        & 0xff;
    grad.addColorStop(0,    `rgba(${gr},${gg},${gb},1)`);
    grad.addColorStop(0.15, `rgba(${pr},${pg},${pb},0.8)`);
    grad.addColorStop(0.4,  `rgba(${pr},${pg},${pb},0.3)`);
    grad.addColorStop(1,    `rgba(${pr},${pg},${pb},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(c);
  })();
  const glowMat    = new THREE.SpriteMaterial({
    map: glowTex, color: 0x000000, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const glowSprite = new THREE.Sprite(glowMat);
  glowSprite.scale.set(3.5, 3.5, 1);
  globe.add(glowSprite);

  // ── State disc ────────────────────────────────────────────────────────────
  const stateTexture = (() => {
    const size = 256, c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d'), cx = size / 2, cy = size / 2;
    const outer = ctx.createRadialGradient(cx, cy, size * 0.18, cx, cy, size * 0.5);
    outer.addColorStop(0,    'rgba(255,255,255,0)');
    outer.addColorStop(0.4,  'rgba(255,255,255,0.55)');
    outer.addColorStop(0.75, 'rgba(255,255,255,0.25)');
    outer.addColorStop(1.0,  'rgba(255,255,255,0)');
    ctx.fillStyle = outer; ctx.fillRect(0, 0, size, size);
    const inner = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.22);
    inner.addColorStop(0,   'rgba(255,255,255,1)');
    inner.addColorStop(0.5, 'rgba(255,255,255,0.7)');
    inner.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = inner; ctx.fillRect(0, 0, size, size);
    return new THREE.CanvasTexture(c);
  })();
  const stateDiscMat = new THREE.SpriteMaterial({
    map: stateTexture, color: 0x22c55e, transparent: true, opacity: 0.0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const stateDisc = new THREE.Sprite(stateDiscMat);
  stateDisc.scale.set(1.1, 1.1, 1);
  stateDisc.position.set(0, 0, 1.35);
  scene.add(stateDisc);

  // ── Animation loop ────────────────────────────────────────────────────────
  let time = 0, smoothAudio = 0, lastFrame = -1;
  const TARGET_FPS = 30, FRAME_MS = 1000 / TARGET_FPS;

  const lerpColor = (current, target, t) => {
    const cr = (current >> 16) & 0xff, cg = (current >> 8) & 0xff, cb = current & 0xff;
    const tr = (target  >> 16) & 0xff, tg = (target  >> 8) & 0xff, tb = target  & 0xff;
    return (Math.round(cr + (tr - cr) * t) << 16) |
           (Math.round(cg + (tg - cg) * t) <<  8) |
            Math.round(cb + (tb - cb) * t);
  };

  function animate(now) {
    requestAnimationFrame(animate);
    if (now === undefined) now = 0;
    if (lastFrame >= 0 && now - lastFrame < FRAME_MS) return;
    lastFrame = now;
    time += 0.006;

    const audio = _audioLevel;
    const st    = _state;

    const raw = Math.min(1, Math.max(0, audio * 5));
    const sf  = raw > smoothAudio ? 0.3 : 0.08;
    smoothAudio += (raw - smoothAudio) * sf;

    const speakPulse = st === 'speaking'
      ? 0.4 + 0.4 * Math.sin(time * 8.0) * Math.sin(time * 3.0)
      : 0;
    const energy = Math.max(smoothAudio, speakPulse);

    const eyeTargetColor =
      st === 'offline'   ? 0xf87171 :
      st === 'thinking'  ? 0xfbbf24 :
      st === 'booting'   ? 0x334455 :
      st === 'speaking'  ? 0x60a5fa :
      st === 'listening' ? 0xa78bfa : 0x4ade80;

    const eyeLerp =
      st === 'speaking'  ? 0.15 :
      st === 'thinking'  ? 0.12 :
      st === 'offline'   ? 0.20 :
      st === 'listening' ? 0.10 : 0.06;

    glowMat.color.setHex(lerpColor(glowMat.color.getHex(), eyeTargetColor, eyeLerp));

    const rotSpeed =
      st === 'thinking' ? 0.005 :
      st === 'speaking' ? 0.003 :
      st === 'ready'    ? 0.008 : 0.0015;
    globe.rotation.y += rotSpeed;
    globe.rotation.x  = Math.sin(time * 0.3) * 0.08;

    if (st === 'thinking') {
      scanRingMat.opacity = Math.min(0.8, scanRingMat.opacity + 0.05);
      scanRing.rotation.y += 0.04;
      scanRing.rotation.x  = Math.sin(time * 1.5) * Math.PI * 0.5;
      scanRing.scale.setScalar(1.0 + 0.05 * Math.sin(time * 6));
    } else {
      scanRingMat.opacity = Math.max(0, scanRingMat.opacity - 0.03);
    }

    bands.forEach((b, i) => {
      b.rotation.y += (0.003 + i * 0.0015) * (i % 2 === 0 ? 1 : -1);
    });

    eyeRings.forEach((ring, i) => {
      ring.rotation.x += (0.002 + i * 0.001) * (i % 2 === 0 ?  1 : -1);
      ring.rotation.z +=  0.001               * (i % 2 === 0 ? -1 :  1);
      const curHex = ring.material.color.getHex();
      if (curHex !== eyeTargetColor)
        ring.material.color.setHex(lerpColor(curHex, eyeTargetColor, eyeLerp));
      ring.material.opacity =
        st === 'speaking'  ? 0.50 + 0.40 * Math.sin(time * 5.0 + i * 1.2) :
        st === 'thinking'  ? 0.40 + 0.40 * Math.sin(time * 3.0 + i * 0.8) :
        st === 'listening' ? 0.55 + 0.30 * Math.sin(time * 4.5 + i * 2.0) :
                             0.50 + 0.25 * Math.sin(time * 2.0 + i * 1.5);
    });

    stateDiscMat.color.setHex(lerpColor(stateDiscMat.color.getHex(), eyeTargetColor, eyeLerp * 1.5));
    const discBase =
      st === 'offline'   ? 0.25 :
      st === 'speaking'  ? 0.55 + 0.35 * Math.sin(time * 7.0 + 0.5) :
      st === 'thinking'  ? 0.45 + 0.30 * Math.sin(time * 4.0) :
      st === 'listening' ? 0.50 + 0.20 * Math.sin(time * 3.0) :
                           0.40 + 0.15 * Math.sin(time * 1.5);
    stateDiscMat.opacity = Math.min(0.95, Math.max(0, discBase + energy * 0.3));
    const discScale = 1.1 + 0.12 * Math.sin(time * 2) + energy * 0.25;
    stateDisc.scale.set(discScale, discScale, 1);

    const sigSpeed = st === 'thinking' ? 5.0 : st === 'speaking' ? 3.5 : 2.5;
    for (let s = 0; s < signals.length; s++) {
      const sig  = signals[s];
      sig.angle += sig.speed * 0.012 * sigSpeed;
      const cosX = Math.cos(sig.tiltX), sinX = Math.sin(sig.tiltX);
      const cosZ = Math.cos(sig.tiltZ), sinZ = Math.sin(sig.tiltZ);
      const cosY = Math.cos(sig.tiltY), sinY = Math.sin(sig.tiltY);
      for (let tt = 0; tt < sig.segs; tt++) {
        const a  = sig.angle + (tt / sig.segs) * sig.arcLen;
        const x  = sig.orbitR * Math.cos(a);
        const z0 = sig.orbitR * Math.sin(a);
        const y2 = -z0 * sinX, z2 = z0 * cosX;
        const x2 = x * cosZ - y2 * sinZ, y3 = x * sinZ + y2 * cosZ;
        const x3 = x2 * cosY + z2 * sinY, z3 = -x2 * sinY + z2 * cosY;
        const idx = tt * 3;
        sig.positions[idx]   = x3;
        sig.positions[idx+1] = y3;
        sig.positions[idx+2] = z3;
      }
      sig.geo.attributes.position.needsUpdate = true;
      sig.mat.opacity = sig.baseBrightness + energy * 0.3 + 0.1 * Math.sin(time * 4.0 + s);
    }

    const breathe     = 0.5 + 0.5 * Math.sin(time * 1.5);
    const breatheFast = 0.5 + 0.5 * Math.sin(time * 4.0);
    const arr  = sparkGeo.attributes.position.array;
    const disp = 0.06 * breathe + 0.04 * breatheFast + energy * 0.6;
    for (let i = 0; i < SPARK_N; i++) {
      const idx = i * 3;
      const off = disp * Math.sin(time * 3 + sparkPhases[i]);
      arr[idx]   = sparkBase[idx]   + sparkNormals[idx]   * off;
      arr[idx+1] = sparkBase[idx+1] + sparkNormals[idx+1] * off;
      arr[idx+2] = sparkBase[idx+2] + sparkNormals[idx+2] * off;
    }
    sparkGeo.attributes.position.needsUpdate = true;

    for (let c = 0; c < cellMeshes.length; c++) {
      const piece = cellMeshes[c];
      const { phase, ringIdx, normal, mat } = piece.userData;
      const wave     = Math.sin(time * 2.5 - ringIdx * 0.7 + phase);
      const waveFast = Math.sin(time * 5.0 + phase * 2.0);
      const push     = Math.max(0, 0.1 * wave + 0.04 * waveFast + energy * 0.2);
      piece.position.set(normal.x * push, normal.y * push, normal.z * push);
      mat.opacity = 0.05 + 0.15 * Math.max(0, wave) + energy * 0.12;
    }

    sparkMat.opacity = 0.25 + 0.25 * breathe + energy * 0.5;
    sparkMat.size    = 0.01  + 0.008 * breathe + energy * 0.006;

    const sc = 1.0 + 0.03 * Math.sin(time * 1.5) + energy * 0.08;
    globe.scale.set(sc, sc, sc);

    const glowPulse = 0.35 + 0.2 * breathe + energy * 0.2;
    glowMat.opacity = glowPulse;
    const gs = 1.8 + 0.4 * breathe + energy * 0.4;
    glowSprite.scale.set(gs, gs, 1);

    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.position.z = getCamZ();
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
});
</script>
</body>
</html>
