<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>misty</title>
  <style>
    :root {
      --cyan: #00e5ff;
      --cyan-dim: #00b8d4;
      --amber: #f8b64a;
      --red: #ff5c5c;
      --green: #7ecf85;
      --text: #c0e8ff;
      --muted: #456070;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: var(--text);
      font-family: "JetBrains Mono", "Hack", ui-monospace, Menlo, monospace; user-select: none; cursor: default; }

    /* The Three.js canvas (injected by reactor.js) sits behind everything. */
    canvas { position: fixed !important; inset: 0; z-index: 0 !important; }

    .overlay { position: fixed; inset: 0; z-index: 10; pointer-events: none; padding: 28px; }
    .overlay > * { pointer-events: auto; }

    .panel { position: absolute; font-size: 11px; letter-spacing: 0.08em; }
    .label { font-size: 9px; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .value { font-size: 13px; color: var(--text); }
    .value.accent { color: var(--cyan); text-shadow: 0 0 8px rgba(0,229,255,0.5); }
    .value.ok { color: var(--green); }
    .value.warn { color: var(--amber); }
    .value.bad { color: var(--red); }

    .top-left  { top: 28px; left: 28px; }
    .top-right { top: 28px; right: 28px; text-align: right; }
    .bottom-left  { bottom: 28px; left: 28px; }
    .bottom-right { bottom: 28px; right: 28px; text-align: right; }
    .bottom-mid   { bottom: 28px; left: 50%; transform: translateX(-50%); text-align: center; }

    .brand {
      font-size: 20px; letter-spacing: 0.6em; color: var(--cyan);
      text-shadow: 0 0 14px rgba(0,229,255,0.5);
    }
    .brand .sub { color: var(--muted); letter-spacing: 0.25em; font-size: 10px; display: block; margin-top: 6px; }

    .panel-row { margin-bottom: 14px; }

    .stream { font-size: 10px; max-height: 140px; overflow: hidden; color: var(--muted); max-width: 360px; }
    .ev { padding: 2px 0; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ev .t { color: var(--cyan); margin-right: 8px; }

    .wake-btn {
      color: var(--cyan); padding: 8px 18px; border: 1px solid rgba(0,229,255,0.4);
      border-radius: 4px; cursor: pointer; letter-spacing: 0.2em; font-size: 11px; text-transform: uppercase;
      transition: all 120ms ease; background: rgba(0,229,255,0.05);
    }
    .wake-btn:hover { background: rgba(0,229,255,0.15); box-shadow: 0 0 14px rgba(0,229,255,0.3); }

    /* Pending confirmation overlay */
    .pending-overlay {
      position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.72); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 180ms ease;
    }
    .pending-overlay.on { opacity: 1; pointer-events: auto; }
    .pending-card {
      background: linear-gradient(180deg, rgba(10,20,30,0.92), rgba(0,5,15,0.98));
      border: 1px solid rgba(0,229,255,0.5);
      border-radius: 12px; padding: 32px 40px; max-width: 640px;
      box-shadow: 0 0 40px rgba(0,229,255,0.25), inset 0 0 30px rgba(0,229,255,0.06);
    }
    .pending-card .tag { color: var(--amber); letter-spacing: 0.3em; font-size: 11px; margin-bottom: 14px; }
    .pending-card .cmd {
      font-size: 17px; color: var(--text); padding: 14px 18px;
      background: rgba(0,229,255,0.05); border-left: 3px solid var(--cyan); margin-bottom: 14px; word-break: break-all;
    }
    .pending-card .reason { font-size: 11px; color: var(--muted); margin-bottom: 22px; }
    .pending-card .actions { display: flex; gap: 14px; }
    .pending-card button {
      flex: 1; padding: 12px; border-radius: 6px; font-family: inherit; font-size: 12px;
      letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
      background: transparent; border: 1px solid; transition: all 120ms ease;
    }
    .pending-card button.allow { color: var(--green); border-color: var(--green); }
    .pending-card button.allow:hover { background: rgba(126,207,133,0.18); box-shadow: 0 0 14px rgba(126,207,133,0.3); }
    .pending-card button.deny { color: var(--red); border-color: var(--red); }
    .pending-card button.deny:hover { background: rgba(255,92,92,0.18); box-shadow: 0 0 14px rgba(255,92,92,0.3); }

    /* CRT scanline overlay */
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1000;
      background: repeating-linear-gradient(0deg, rgba(0,229,255,0.018) 0px, transparent 1px, transparent 3px);
    }


    /* Floating misty-opened panels */
    .mpanel {
      position: fixed; z-index: 50; display: flex; flex-direction: column;
      background: linear-gradient(180deg, rgba(6,14,22,0.96), rgba(0,5,12,0.98));
      border: 1px solid rgba(0,229,255,0.45);
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 32px rgba(0,229,255,0.22), inset 0 0 20px rgba(0,229,255,0.04);
      min-width: 240px; min-height: 160px;
      resize: both; /* native corner-drag resize handle */
    }
    .mpanel.active {
      border-color: rgba(0,229,255,0.85);
      box-shadow: 0 0 48px rgba(0,229,255,0.42), inset 0 0 24px rgba(0,229,255,0.06);
    }
    .mpanel .head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: rgba(0,229,255,0.08);
      border-bottom: 1px solid rgba(0,229,255,0.25); cursor: move;
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--cyan);
    }
    .mpanel .head .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mpanel .head .close {
      background: transparent; border: 1px solid rgba(255,92,92,0.5);
      color: var(--red); cursor: pointer; font-family: inherit;
      padding: 2px 8px; border-radius: 3px; font-size: 10px; letter-spacing: 0.1em;
    }
    .mpanel .head .close:hover { background: rgba(255,92,92,0.18); box-shadow: 0 0 10px rgba(255,92,92,0.3); }
    .mpanel .body { flex: 1; overflow: auto; background: #000; position: relative; }
    .mpanel .body iframe,
    .mpanel .body video,
    .mpanel .body img { width: 100%; height: 100%; border: 0; display: block; object-fit: contain; }
    .mpanel .body pre { padding: 14px; margin: 0; color: var(--text); font-size: 12px;
      white-space: pre-wrap; word-break: break-word; font-family: inherit; }
  </style>
</head>
<body>

  <!-- Visible error capture — anything that throws shows up here. -->
  <div id="err" style="position:fixed;left:0;right:0;bottom:0;z-index:9999;background:rgba(80,0,0,0.9);color:#fff;padding:8px 12px;font:12px ui-monospace,monospace;white-space:pre-wrap;max-height:40vh;overflow:auto;display:none;"></div>
  <script>
    window.addEventListener("error", function (e) {
      var d = document.getElementById("err");
      d.style.display = "block";
      d.textContent += "ERROR: " + (e.message || e.error) + " @ " + (e.filename || "?") + ":" + (e.lineno || "?") + "\n";
    });
    window.addEventListener("unhandledrejection", function (e) {
      var d = document.getElementById("err");
      d.style.display = "block";
      d.textContent += "REJECT: " + (e.reason && e.reason.message ? e.reason.message : e.reason) + "\n";
    });
  </script>

  <!-- Three.js holographic reactor. Self-hosted so cross-origin errors don't
       get silenced as "Script error." by the browser. -->
  <script src="./three.min.js"
          onerror="document.getElementById('err').style.display='block';document.getElementById('err').textContent='three.min.js failed to load';"></script>
  <script src="./reactor.js"></script>

  <!-- UI overlay on top of the reactor. -->
  <div class="overlay">
    <div class="panel top-left">
      <div class="brand">MISTY<span class="sub">OS INTELLIGENCE CORE</span></div>
      <div class="panel-row" style="margin-top: 28px;">
        <div class="label">System Status</div>
        <div class="value accent" id="system-status">initializing</div>
      </div>
      <div class="panel-row">
        <div class="label">Provider / Model</div>
        <div class="value" id="provider-model">—</div>
      </div>
      <div class="panel-row">
        <div class="label">Host</div>
        <div class="value" id="host">—</div>
      </div>
    </div>

    <div class="panel top-right">
      <div class="panel-row">
        <div class="label">Voice Mode</div>
        <div class="value accent" id="voice-mode">OFF</div>
      </div>
      <div class="panel-row">
        <div class="label">Pending</div>
        <div class="value" id="pending-count">0</div>
      </div>
      <div class="panel-row">
        <div class="label">Events Received</div>
        <div class="value" id="event-count">0</div>
      </div>
      <div class="panel-row">
        <div class="label">Uptime</div>
        <div class="value" id="uptime">00:00</div>
      </div>
      <div class="panel-row">
        <div class="label">Turn Phase</div>
        <div class="value accent" id="turn-phase">idle</div>
      </div>
      <div class="panel-row">
        <div class="label">Audio Level</div>
        <div class="value" id="audio-meter">0.00</div>
      </div>
    </div>

    <div class="panel bottom-left">
      <div class="label">Event Stream</div>
      <div class="stream" id="stream"></div>
    </div>

    <div class="panel bottom-mid">
      <button class="wake-btn" id="wake-btn">⌖ FIRE WAKE SIGNAL</button>
    </div>

    <div class="panel bottom-right">
      <div class="label">Network</div>
      <div class="value" id="network">—</div>
    </div>
  </div>

  <!-- Pending confirmation modal -->
  <div class="pending-overlay" id="overlay">
    <div class="pending-card" id="pending-card">
      <div class="tag">CONFIRMATION REQUESTED</div>
      <div class="cmd" id="p-cmd"></div>
      <div class="reason" id="p-reason"></div>
      <div class="actions">
        <button class="allow" onclick="resolveConfirmation('allow')">✓ ALLOW</button>
        <button class="deny" onclick="resolveConfirmation('deny')">✗ DENY</button>
      </div>
    </div>
  </div>

<script>
// HUD wiring. The reactor script exposes window.setJarvisState(state, audioLevel).
(function () {
  const LOC = window.location;
  const BASE = LOC.origin;
  const WS = BASE.replace(/^http/, "ws") + "/ws";
  const $ = (id) => document.getElementById(id);

  let pending = [];
  let currentPending = null;
  let eventCount = 0;
  const boot = Date.now();

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function setState(state, audio) {
    if (typeof window.setJarvisState === "function") {
      window.setJarvisState(state, audio || 0);
    }
  }

  function fmtUptime() {
    const s = Math.floor((Date.now() - boot) / 1000);
    return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
  }
  setInterval(() => $("uptime").textContent = fmtUptime(), 1000);

  function addEvent(obj) {
    eventCount++;
    $("event-count").textContent = eventCount;
    const t = new Date().toTimeString().slice(0, 8);
    const row = document.createElement("div");
    row.className = "ev";
    row.innerHTML = `<span class="t">${t}</span>${esc(JSON.stringify(obj))}`;
    const stream = $("stream");
    stream.prepend(row);
    while (stream.children.length > 20) stream.lastChild.remove();
  }

  function renderPending() {
    $("pending-count").textContent = pending.length;
    if (pending.length === 0) {
      $("overlay").classList.remove("on");
      currentPending = null;
      return;
    }
    currentPending = pending[0];
    $("p-cmd").textContent = currentPending.promptText || JSON.stringify(currentPending.input);
    $("p-reason").textContent = currentPending.reason || "";
    $("overlay").classList.add("on");
    setState("thinking", 0.5);
  }

  window.resolveConfirmation = async function (decision) {
    if (!currentPending) return;
    const id = currentPending.id;
    try {
      await fetch(`${BASE}/api/confirmation/${encodeURIComponent(id)}`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ decision }),
      });
    } catch {}
    pending = pending.filter(p => p.id !== id);
    renderPending();
    if (pending.length === 0) setState("ready", 0);
  };

  async function refreshPending() {
    try {
      const r = await fetch(`${BASE}/api/confirmation`);
      if (!r.ok) return;
      const { pending: p } = await r.json();
      pending = p || [];
      renderPending();
    } catch {}
  }

  async function refreshModels() {
    try {
      const r = await fetch(`${BASE}/api/models`);
      if (!r.ok) return;
      const body = await r.json();
      $("provider-model").textContent = `${body.provider} / ${body.model}`;
    } catch {}
  }

  $("host").textContent = LOC.host;
  $("network").textContent = "ONLINE";

  // Force fullscreen on load. Chromium --kiosk mode allows programmatic
  // requestFullscreen without a user gesture, so this lands reliably even
  // when the WM doesn't honor --kiosk (xfwm4 without a proper session).
  function goFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => { /* some browsers need gesture; fine */ });
  }
  // Try immediately + a few retries in case chromium isn't ready yet.
  setTimeout(goFullscreen, 100);
  setTimeout(goFullscreen, 500);
  setTimeout(goFullscreen, 1500);
  // Also on first user interaction, just in case.
  window.addEventListener("click", goFullscreen, { once: true });
  window.addEventListener("keydown", goFullscreen, { once: true });

  $("wake-btn").addEventListener("click", async () => {
    try {
      await fetch(`${BASE}/api/voice/wake-triggered`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ source: "hud" }),
      });
    } catch {}
  });

  function connect() {
    $("system-status").textContent = "CONNECTING";
    $("system-status").className = "value warn";
    setState("booting", 0);
    const ws = new WebSocket(WS);
    ws.onopen = () => {
      $("system-status").textContent = "OPERATIONAL";
      $("system-status").className = "value ok";
      setState("ready", 0);
      refreshPending();
      refreshModels();
    };
    ws.onmessage = (msg) => {
      let ev; try { ev = JSON.parse(msg.data); } catch { return; }
      addEvent(ev);
      switch (ev.type) {
        case "voice.mode_changed":
          $("voice-mode").textContent = ev.mode.toUpperCase();
          if (ev.mode === "wake") setState("listening", 0.4);
          else if (ev.mode === "ptt") setState("listening", 0.3);
          else if (pending.length === 0) setState("ready", 0);
          break;
        case "voice.wake_triggered":
          setState("listening", 0.8);
          setTimeout(() => { if (!currentPending) setState("ready", 0); }, 2500);
          break;
        case "confirmation.opened":
          refreshPending();
          break;
        case "confirmation.resolved":
          pending = pending.filter(p => p.id !== ev.id);
          renderPending();
          break;
        case "turn.state":
          setState(ev.phase, ev.audioLevel || 0);
          $("turn-phase").textContent = ev.phase;
          $("audio-meter").textContent = (ev.audioLevel || 0).toFixed(3);
          break;
        case "panel.opened":
          renderPanel(ev.panel);
          break;
        case "panel.closed":
          removePanel(ev.id);
          break;
        case "panel.updated": {
          // If the panel exists, animate to the new position/size instead of
          // re-rendering from scratch — preserves iframe state, scroll, etc.
          const existing = openPanels.get(ev.panel.id);
          if (existing) {
            existing.style.transition = "left 400ms ease, top 400ms ease, width 400ms ease, height 400ms ease";
            existing.style.left = (ev.panel.x ?? 120) + "px";
            existing.style.top = (ev.panel.y ?? 120) + "px";
            existing.style.width = (ev.panel.width ?? 560) + "px";
            existing.style.height = (ev.panel.height ?? 420) + "px";
            const title = existing.querySelector(".title");
            if (title) title.textContent = ev.panel.title || ev.panel.kind;
            setTimeout(() => { existing.style.transition = ""; }, 500);
          } else {
            renderPanel(ev.panel);
          }
          break;
        }
      }
    };
    ws.onclose = () => {
      $("system-status").textContent = "OFFLINE";
      $("system-status").className = "value bad";
      $("network").textContent = "DISCONNECTED";
      setState("offline", 0);
      setTimeout(connect, 2000);
    };
  }

  // --- Panels (misty-opened floating windows) ---
  const openPanels = new Map(); // id -> element
  let zCounter = 100;
  function raisePanel(el) {
    zCounter += 1;
    el.style.zIndex = String(zCounter);
    for (const other of openPanels.values()) other.classList.remove("active");
    el.classList.add("active");
  }

  function imageExt(s) { return /\.(png|jpe?g|gif|webp|bmp|svg)(\?|$)/i.test(s || ""); }
  function videoExt(s) { return /\.(mp4|webm|ogg|mov|mkv)(\?|$)/i.test(s || ""); }

  function renderPanel(spec) {
    if (!spec || !spec.id || openPanels.has(spec.id)) return;
    const el = document.createElement("div");
    el.className = "mpanel";
    el.style.left = (spec.x ?? 140) + "px";
    el.style.top = (spec.y ?? 140) + "px";
    el.style.width = (spec.width ?? 560) + "px";
    el.style.height = (spec.height ?? 420) + "px";

    const head = document.createElement("div");
    head.className = "head";
    head.innerHTML = `<span class="title">${esc(spec.title || spec.kind)}</span>`;
    const closeBtn = document.createElement("button");
    closeBtn.className = "close";
    closeBtn.textContent = "✕";
    closeBtn.onclick = () => closePanel(spec.id);
    head.appendChild(closeBtn);

    const body = document.createElement("div");
    body.className = "body";
    body.appendChild(panelContent(spec));

    el.appendChild(head);
    el.appendChild(body);
    document.body.appendChild(el);
    openPanels.set(spec.id, el);

    // Raise to top on any click inside the panel.
    el.addEventListener("mousedown", () => raisePanel(el));
    raisePanel(el);

    makeDraggable(el, head);
  }

  function panelContent(spec) {
    switch (spec.kind) {
      case "browser": {
        const f = document.createElement("iframe");
        f.src = spec.src || "about:blank";
        f.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups");
        return f;
      }
      case "video": {
        const v = document.createElement("video");
        v.src = spec.src || "";
        v.controls = true; v.autoplay = true;
        return v;
      }
      case "image": {
        const i = document.createElement("img");
        i.src = spec.src || "";
        i.alt = spec.title || "image";
        return i;
      }
      case "text": {
        const p = document.createElement("pre");
        p.textContent = spec.content || "";
        return p;
      }
      case "file": {
        const src = spec.src || "";
        if (imageExt(src)) {
          const i = document.createElement("img"); i.src = src; return i;
        }
        if (videoExt(src)) {
          const v = document.createElement("video"); v.src = src; v.controls = true; return v;
        }
        const f = document.createElement("iframe"); f.src = src; return f;
      }
      default: {
        const d = document.createElement("pre");
        d.textContent = "unsupported panel kind: " + spec.kind;
        return d;
      }
    }
  }

  function removePanel(id) {
    const el = openPanels.get(id);
    if (!el) return;
    el.remove();
    openPanels.delete(id);
  }

  async function closePanel(id) {
    try {
      await fetch(`${BASE}/api/panel/${encodeURIComponent(id)}`, { method: "DELETE" });
    } catch {}
    // Server will emit panel.closed — but also remove locally in case WS is slow.
    removePanel(id);
  }

  function makeDraggable(el, handle) {
    let dx = 0, dy = 0, dragging = false;
    handle.addEventListener("mousedown", (e) => {
      if (e.target.classList.contains("close")) return;
      dragging = true;
      const r = el.getBoundingClientRect();
      dx = e.clientX - r.left; dy = e.clientY - r.top;
      e.preventDefault();
    });
    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      el.style.left = (e.clientX - dx) + "px";
      el.style.top = (e.clientY - dy) + "px";
    });
    window.addEventListener("mouseup", () => { dragging = false; });
  }

  connect();
  setInterval(refreshPending, 5000);

  window.addEventListener("keydown", (e) => {
    if (!currentPending) return;
    if (e.key === "Escape") resolveConfirmation("deny");
    else if (e.key === "Enter") resolveConfirmation("allow");
  });
})();
</script>
</body>
</html>
