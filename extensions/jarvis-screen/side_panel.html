<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <style>
    :root {
      --bg:          #0c0c0e;
      --surface:     #131316;
      --surface-2:   #1a1a1f;
      --border:      rgba(255,255,255,0.07);
      --border-hov:  rgba(255,255,255,0.12);
      --text:        #e5e7eb;
      --text-dim:    #6b7280;
      --text-dimmer: #404048;
      --accent:      #0ea5e9;
      --accent-dim:  rgba(14,165,233,0.15);
      --user-bg:     #1a3347;
      --error:       #f87171;
      --error-bg:    rgba(248,113,113,0.08);
      --radius:      12px;
      --radius-sm:   8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-bar-empty {
      font-size: 11px;
      color: var(--text-dimmer);
      align-self: center;
    }

    .tab-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
      max-width: 130px;
    }

    .tab-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-chip:hover { border-color: var(--border-hov); color: var(--text); }
    .tab-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .tab-initial {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: var(--text-dim);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-hov); border-radius: 4px; }

    /* ── Reading strip ── */
    .reading-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 0 4px;
      font-size: 12px;
      color: var(--accent);
    }

    .reading-strip.hidden { display: none; }

    .reading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 40px 24px;
      color: var(--text-dim);
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-icon svg { opacity: 0.5; }

    .empty h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .empty p {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 220px;
      line-height: 1.5;
    }

    .empty-shortcut {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dimmer);
      margin-top: 4px;
    }

    kbd {
      background: var(--surface-2);
      border: 1px solid var(--border-hov);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Message rows ── */
    .row {
      display: flex;
      gap: 10px;
      animation: msgIn 0.2s ease-out both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row.user { flex-direction: row-reverse; }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 1px;
    }

    .avatar.jarvis {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: #fff;
    }

    .avatar.user {
      background: var(--user-bg);
      border: 1px solid var(--border-hov);
      color: var(--accent);
    }

    .bubble {
      max-width: calc(100% - 60px);
    }

    .bubble-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }

    .row.user .bubble-name { text-align: right; }

    .bubble-body {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
    }

    .row.user .bubble-body {
      background: var(--user-bg);
      padding: 9px 13px;
      border-radius: var(--radius);
      border-bottom-right-radius: 3px;
    }

    .row.jarvis .bubble-body { padding: 0; }

    /* Error state */
    .row.error .bubble-body {
      color: var(--error);
      background: var(--error-bg);
      padding: 9px 13px;
      border-radius: var(--radius);
      font-size: 13px;
    }

    /* ── Streaming cursor ── */
    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Tool event ── */
    .tool-event {
      font-size: 11px;
      color: var(--text-dimmer);
      padding: 2px 8px;
      border-left: 2px solid var(--border-hov);
      margin: 3px 0;
      font-family: 'SF Mono', Consolas, 'Courier New', monospace;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .typing span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: typingDot 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.25; transform: scale(0.9); }
      30%            { opacity: 1;    transform: scale(1.1); }
    }

    /* Inline code */
    .bubble-body code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', Consolas, 'Courier New', monospace;
      font-size: 12.5px;
      color: #93c5fd;
    }

    /* Code blocks */
    .bubble-body pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: 'SF Mono', Consolas, 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.5;
    }

    .bubble-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e5e7eb;
    }

    .bubble-body strong { font-weight: 600; color: #f0f0f0; }
    .bubble-body em     { color: #93c5fd; font-style: italic; }

    .bubble-body ul, .bubble-body ol {
      padding-left: 18px;
      margin: 6px 0;
    }

    .bubble-body li { margin: 3px 0; }

    /* ── Input bar ── */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      flex-shrink: 0;
      position: relative;
    }

    /* ── @ mention popup ── */
    .mention-popup {
      position: absolute;
      bottom: calc(100% + 2px);
      left: 14px;
      right: 14px;
      background: var(--surface-2);
      border: 1px solid var(--border-hov);
      border-radius: var(--radius);
      padding: 4px;
      z-index: 200;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }

    .mention-popup.hidden { display: none; }
    .mention-popup::-webkit-scrollbar { width: 3px; }
    .mention-popup::-webkit-scrollbar-thumb { background: var(--border-hov); border-radius: 3px; }

    .mention-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
    }

    .mention-item:hover, .mention-item.sel {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .mention-item .m-initial {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border-hov);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .mention-item .m-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 12px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within { border-color: var(--border-hov); }

    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 22px;
      max-height: 120px;
      padding: 0;
    }

    .input-box textarea::placeholder { color: var(--text-dimmer); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .icon-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .icon-btn.primary:hover { background: #38bdf8; }
    .icon-btn.primary:disabled { background: var(--accent-dim); }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-logo">J</div>
        <span class="header-title">JARVIS</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="tab-bar" id="tabBar">
      <span class="tab-bar-empty">Loading tabs…</span>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="reading-strip hidden" id="readingStrip">
        <div class="reading-dot"></div>
        <span>Reading page…</span>
      </div>
      <div class="empty" id="emptyState">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/>
          </svg>
        </div>
        <div>
          <h2>JARVIS</h2>
          <p>Ask anything — JARVIS reads the current page automatically.</p>
        </div>
        <div class="empty-shortcut">
          Type <kbd>@</kbd> to reference another tab
        </div>
      </div>
    </div>

    <!-- @ mention popup (anchored to input-bar) -->
    <div class="mention-popup hidden" id="mentionPopup"></div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-box">
        <textarea
          id="query"
          rows="1"
          placeholder="Ask about this page… or type @ to add another tab"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <div class="input-actions">
          <!-- Camera: screenshot fallback -->
          <button class="icon-btn" id="captureBtn" title="Screenshot + analyze (Ctrl+Shift+J)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <!-- Send -->
          <button class="icon-btn primary" id="sendBtn" title="Send (Enter)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>
  <script src="side_panel.js"></script>
</body>
</html>
