<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg:         #0c0c0e;
      --surface:    #131316;
      --surface-2:  #1a1a1f;
      --border:     rgba(255,255,255,0.07);
      --border-hov: rgba(255,255,255,0.12);
      --text:       #e5e7eb;
      --text-dim:   #6b7280;
      --text-dimmer:#404048;
      --accent:     #b0b8c1;
      --accent-dim: rgba(176,184,193,0.15);
      --user-bg:    #1a1e22;
      --error:      #f87171;
      --error-bg:   rgba(248,113,113,0.08);
      --radius:     12px;
      --radius-sm:  8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 500px;
      height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-logo {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #b0b8c1, #8c949e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.3px;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--bg);
    }

    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border-hov); border-radius: 4px; }

    .message {
      display: flex;
      gap: 8px;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .message-content {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: var(--radius);
      line-height: 1.55;
      word-wrap: break-word;
      font-size: 13.5px;
    }

    .user .message-content {
      background: var(--user-bg);
      color: var(--text);
      border-bottom-right-radius: 3px;
      border: 1px solid rgba(176,184,193,0.1);
    }

    .assistant .message-content {
      background: transparent;
      color: var(--text);
      padding: 0;
    }

    .message.error .message-content {
      background: var(--error-bg);
      border: 1px solid rgba(248,113,113,0.2);
      color: var(--error);
      padding: 9px 13px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      text-align: center;
      padding: 32px;
      gap: 12px;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 240px;
      line-height: 1.5;
    }

    .input-section {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 12px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within { border-color: var(--border-hov); }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 22px;
      padding: 0;
    }

    textarea::placeholder { color: var(--text-dimmer); }

    button {
      width: 30px;
      height: 30px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    button:hover { background: #c8d0d8; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .loading span {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .loading span:nth-child(2) { animation-delay: 0.2s; }
    .loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }

    .shortcut-hint {
      text-align: center;
      color: var(--text-dimmer);
      font-size: 11px;
      margin-top: 8px;
    }

    kbd {
      background: var(--surface-2);
      border: 1px solid var(--border-hov);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 10px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">J</div>
    <h1>JARVIS</h1>
  </div>

  <div class="messages-container" id="messagesContainer">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <p>Ask JARVIS about what's on your screen</p>
      <div class="shortcut-hint">
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>J</kbd> to capture
      </div>
    </div>
  </div>

  <div class="input-section">
    <div class="input-wrapper">
      <textarea id="query" placeholder="Ask about what's on screen…" rows="1"></textarea>
      <button id="capture" title="Send (Enter)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="shortcut-hint">Press <kbd>Enter</kbd> to send</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
