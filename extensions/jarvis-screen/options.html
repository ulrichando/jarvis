<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JARVIS Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0e1a; --bg2:#0f1525; --border:#1e2d4a; --accent:#00b4d8; --text:#cdd6f4; --dim:#6c7a9c; --r:8px; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; padding:40px; max-width:540px; }
    header { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    header img { width:36px; height:36px; }
    h1 { font-size:18px; font-weight:600; letter-spacing:.1em; color:var(--accent); text-transform:uppercase; }
    label { display:block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:8px; }
    input[type=text] { width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:monospace; font-size:13px; padding:10px 12px; outline:none; transition:border-color .2s; margin-bottom:6px; }
    input[type=text]:focus { border-color:var(--accent); }
    .hint { font-size:11px; color:var(--dim); margin-bottom:24px; }
    .row { display:flex; gap:10px; align-items:center; }
    button { padding:9px 20px; border-radius:var(--r); border:none; font-size:13px; font-weight:600; cursor:pointer; transition:background .2s; }
    #save { background:var(--accent); color:#fff; }
    #save:hover { background:#0096c7; }
    #test { background:var(--bg2); border:1px solid var(--border); color:var(--text); }
    #test:hover { border-color:var(--accent); color:var(--accent); }
    #msg { font-size:12px; color:var(--dim); }
    #msg.ok { color:#a6e3a1; } #msg.err { color:#f38ba8; }
  </style>
</head>
<body>
  <header>
    <img src="icon48.png" alt="JARVIS">
    <h1>JARVIS Settings</h1>
  </header>
  <label for="url">Brain URL</label>
  <input type="text" id="url" placeholder="https://jarvis.local">
  <p class="hint">URL of your JARVIS Proxmox brain. Default: <code>https://jarvis.local</code></p>
  <div class="row">
    <button id="save">Save</button>
    <button id="test">Test connection</button>
    <span id="msg"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
