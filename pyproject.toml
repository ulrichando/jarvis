[project]
name = "jarvis-brain"
version = "2.0.0"
description = "J.A.R.V.I.S. — Autonomous AI Agent"
requires-python = ">=3.10"
dependencies = [
    "anthropic",
    "openai",
    "aiohttp",
    "numpy",
    "msgpack",
    "edge-tts",
    "faster-whisper",
    "sounddevice",
]

[project.optional-dependencies]
vision = ["Pillow", "mss", "pytesseract"]
tts = ["piper-tts"]
all = ["jarvis-brain[vision,tts]"]

[project.scripts]
jarvis = "shells.cli.jarvis_cli:run"
jarvis-web = "shells.web.server:main"

[tool.setuptools.packages.find]
include = ["brain*", "shells*"]
