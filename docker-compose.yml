networks:
  jarvis_net:
    driver: bridge

services:

  # ── nginx reverse proxy (zero-downtime blue-green swap) ──────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # upstream.conf is written by the deploy workflow to point at the active slot
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: always
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── JARVIS backend (active slot) ─────────────────────────────────────────────
  # The deploy workflow swaps this to a fresh container while keeping nginx up.
  # "jarvis" is always the live slot nginx routes to.
  # "jarvis_canary" is the staging slot brought up during a deploy, then renamed.
  jarvis:
    build: .
    image: ghcr.io/ulrichando/jarvis:latest
    expose:
      - "8765"
    volumes:
      - jarvis_data:/data/.jarvis
      - ./.env:/app/.env:ro
      # SSH key mounted into jarvis user's home — container runs as non-root 'jarvis'
      # Generate on the Proxmox host: ssh-keygen -t ed25519 -f /root/.ssh/jarvis_to_kali
      - /root/.ssh/jarvis_to_kali:/data/.ssh/jarvis_to_kali:ro
      - /root/.ssh/known_hosts:/data/.ssh/known_hosts:rw
      # Note: no /dev/snd — CT104 is a server LXC with no sound hardware.
      # TTS/STT audio is handled via SSH to the owner's desktop machine.
    env_file:
      - .env
    environment:
      # Ollama service endpoint (Docker DNS resolves 'ollama' to the container)
      - OLLAMA_HOST=http://ollama:11434
      - JARVIS_NO_SANDBOX=1
      - JARVIS_OWNER=ulrich
      # Data directory — must match the volume mount above
      - JARVIS_HOME=/data/.jarvis
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Ollama (local LLM fallback) ─────────────────────────────────────────────
  # GPU: uncomment the `deploy` block below if you have an NVIDIA GPU
  ollama:
    image: ollama/ollama:0.9.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Prowlarr (indexer manager) ─────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    ports:
      - "9696:9696"
    volumes:
      - prowlarr_config:/config
    environment:
      - PUID=0
      - PGID=0
      - TZ=Africa/Douala
    restart: unless-stopped
    networks:
      - jarvis_net

  # ── PostgreSQL — short-term conversation memory ──────────────────────────────
  # NOTE: using the system PostgreSQL on port 5432 (already running on host).
  # This service is kept here for reference / cloud deployments.
  # Disabled locally to avoid port conflict with the host PostgreSQL instance.
  # postgres:
  #   image: postgres:16-alpine
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   environment:
  #     - POSTGRES_USER=jarvis
  #     - POSTGRES_PASSWORD=697968751ando
  #     - POSTGRES_DB=jarvis
  #   restart: unless-stopped
  #   networks:
  #     - jarvis_net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U jarvis"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Weaviate — long-term semantic memory + RAG vector store ─────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.0
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=jarvis-weaviate
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


volumes:
  jarvis_data:      # JARVIS config, memory, and models
  ollama_data:      # Ollama model weights
  prowlarr_config:  # Prowlarr indexer config and DB
  postgres_data:    # PostgreSQL conversation history
  weaviate_data:    # Weaviate vector store
