networks:
  jarvis_net:
    driver: bridge

services:

  # ── nginx reverse proxy (zero-downtime blue-green swap) ──────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # upstream.conf is written by the deploy workflow to point at the active slot
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - jarvis
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── JARVIS backend (active slot) ─────────────────────────────────────────────
  # The deploy workflow swaps this to a fresh container while keeping nginx up.
  # "jarvis" is always the live slot nginx routes to.
  # "jarvis_canary" is the staging slot brought up during a deploy, then renamed.
  jarvis:
    build: .
    image: ghcr.io/ulrichando/jarvis:latest
    expose:
      - "8765"
    volumes:
      - jarvis_data:/data/.jarvis
      - ./.env:/app/.env:ro
      # SSH key mounted into jarvis user's home — container runs as non-root 'jarvis'
      # Generate on the Proxmox host: ssh-keygen -t ed25519 -f /root/.ssh/jarvis_to_kali
      - /root/.ssh/jarvis_to_kali:/data/.ssh/jarvis_to_kali:ro
      - /root/.ssh/known_hosts:/data/.ssh/known_hosts:rw
      # Audio: scope to sound devices only (not the full /dev tree)
      - /dev/snd:/dev/snd
    devices:
      - /dev/snd
    env_file:
      - .env
    environment:
      # Ollama service endpoint (Docker DNS resolves 'ollama' to the container)
      - OLLAMA_HOST=http://ollama:11434
      - JARVIS_NO_SANDBOX=1
      - JARVIS_OWNER=ulrich
      # Data directory — must match the volume mount above
      - JARVIS_HOME=/data/.jarvis
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Ollama (local LLM fallback) ─────────────────────────────────────────────
  # GPU: uncomment the `deploy` block below if you have an NVIDIA GPU
  ollama:
    image: ollama/ollama:0.9.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || wget -qO- http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env

volumes:
  jarvis_data:   # JARVIS config, memory, and models
  ollama_data:   # Ollama model weights
