syntax = "proto3";

package jarvis;

// The core JARVIS brain service
service JarvisBrain {
  // Send a text query and get a response
  rpc Query (QueryRequest) returns (QueryResponse);

  // Stream audio for speech-to-text, get response back
  rpc VoiceQuery (stream AudioChunk) returns (QueryResponse);

  // Execute a system command
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);

  // Get conversation history
  rpc GetHistory (HistoryRequest) returns (HistoryResponse);

  // Stream responses for real-time output
  rpc QueryStream (QueryRequest) returns (stream StreamChunk);
}

message QueryRequest {
  string text = 1;
  string context = 2;  // optional additional context
}

message QueryResponse {
  string text = 1;
  string intent = 2;       // parsed intent (e.g., "open_app", "answer", "command")
  repeated Action actions = 3;  // actions to execute
}

message Action {
  string type = 1;    // "shell", "open_url", "open_app", etc.
  string payload = 2; // the command or URL
}

message AudioChunk {
  bytes data = 1;
  int32 sample_rate = 2;
}

message ExecuteRequest {
  string command = 1;
  bool safe_mode = 2;  // if true, require confirmation for dangerous commands
}

message ExecuteResponse {
  string output = 1;
  int32 exit_code = 2;
  bool success = 3;
}

message HistoryRequest {
  int32 limit = 1;
}

message HistoryResponse {
  repeated ConversationTurn turns = 1;
}

message ConversationTurn {
  string role = 1;     // "user" or "jarvis"
  string content = 2;
  int64 timestamp = 3;
}

message StreamChunk {
  string text = 1;
  bool done = 2;
}
