worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Keep connections alive so WebSocket upgrades survive upstream swaps
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Don't buffer responses — JARVIS uses SSE and WebSocket streaming
    proxy_buffering off;
    proxy_request_buffering off;

    # Active upstream is written by the deploy script into conf.d/upstream.conf
    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;
        server_name _;

        # WebSocket + SSE support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeouts for agent loop responses (can take minutes)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass http://jarvis_active;
        }
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
