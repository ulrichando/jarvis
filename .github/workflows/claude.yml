name: Claude Code

# Interactive agent: mention @claude in any issue, PR comment, or review and
# Claude implements / fixes / answers, following CLAUDE.md. The action gates on
# the actor having write access, so randoms can't trigger it.
#
# BRIDGE (Path A): this runs stock claude-code-action until JARVIS's own CLI
# runner (Path B) can take over — at which point only the `uses:` step below
# swaps to the JARVIS runner; the triggers + permissions stay.
#
# DORMANT until the key exists:  gh secret set ANTHROPIC_API_KEY

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@e9072dc659c8b408d9df95ab08cfd8bf7acce9d8 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
