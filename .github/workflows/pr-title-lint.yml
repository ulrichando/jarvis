name: pr-title-lint

# Enforces Conventional-Commit PR titles (feat:/fix:/chore:/ci:/docs:…) so
# release-please can derive versions + changelog from squash-merge titles.
# Uses `pull_request` (read-only) — a bad title just fails this check; no
# write token, no PR-code checkout.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  title:
    name: conventional title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            ci
            docs
            refactor
            perf
            test
            build
            revert
