name: web-tests

# Runs the Next.js web app build + test suite on every push/PR that
# touches src/web/**. The reliable gate is `bun run build` — it catches
# import errors, missing types, and broken pages. `bun test` is kept
# non-blocking while native bindings are verified in CI.

on:
  push:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"

# Least-privilege default; jobs opt into more only if needed.
permissions:
  contents: read

jobs:
  build-and-test:
    name: build + test (linux, bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      # vitest runs under NODE (see the test step). Pin it so the
      # better-sqlite3 native rebuild targets a known node ABI.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: bun install
        run: bun install

      - name: bun run build
        # This is the REQUIRED gate — catches broken imports, type errors,
        # and page compilation failures. Must pass for the job to succeed.
        # auth.ts throws at import when DATABASE_URL is unset, which fails Next's
        # page-data collection (e.g. /api/bridge/token). A dummy URL lets the
        # lazy postgres client construct — no connection happens at build time.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-only-not-a-secret
        run: bun run build

      - name: vitest (node runtime)
        # The suite is vitest and runs under NODE, not bun (bun's runtime
        # mishandles vitest's node:fs mocks + the better-sqlite3 node-ABI
        # binding). Rebuild the addon for the runner's node, then run via node.
        #
        # STILL non-blocking: a handful of tests are NOT hermetic and fail in
        # CI's no-network/no-services sandbox even though they pass locally —
        #   * tests/bridge/github.test.ts — node:fs mock doesn't intercept;
        #     locally a real ~/.jarvis/connectors.json masks it.
        #   * tests/kimi/{dispatch,e2e}.test.ts swarm — make real outbound AI
        #     API calls that time out in CI.
        # Drop continue-on-error once those are mocked/quarantined (tracked).
        continue-on-error: true
        run: |
          npm rebuild better-sqlite3
          npx vitest run
