name: web-tests

# Runs the Next.js web app build + test suite on every push/PR that
# touches src/web/**. The reliable gate is `bun run build` — it catches
# import errors, missing types, and broken pages. `bun test` is kept
# non-blocking while native bindings are verified in CI.

on:
  push:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"

jobs:
  build-and-test:
    name: build + test (linux, bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install

      - name: bun run build
        # This is the REQUIRED gate — catches broken imports, type errors,
        # and page compilation failures. Must pass for the job to succeed.
        run: bun run build

      - name: bun run test
        # The suite is vitest (the package "test" script). It MUST run via
        # `bun run test`; `bun test` invokes bun's native runner, which
        # mis-handles the vitest suite (~107 spurious failures). Still
        # non-blocking until one green CI run is observed here — then drop
        # continue-on-error to enforce. (Local `vitest run`: 298 passing.)
        continue-on-error: true
        run: bun run test
