name: web-tests

# Runs the Next.js web app build + test suite on every push/PR that
# touches src/web/**. The reliable gate is `bun run build` — it catches
# import errors, missing types, and broken pages. `bun test` is kept
# non-blocking while native bindings are verified in CI.

on:
  push:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/web/**"
      - ".github/workflows/web-tests.yml"

jobs:
  build-and-test:
    name: build + test (linux, bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # vitest runs under NODE (see the test step). Pin it so the
      # better-sqlite3 native rebuild targets a known node ABI.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: bun install
        run: bun install

      - name: bun run build
        # This is the REQUIRED gate — catches broken imports, type errors,
        # and page compilation failures. Must pass for the job to succeed.
        # auth.ts throws at import when DATABASE_URL is unset, which fails Next's
        # page-data collection (e.g. /api/bridge/token). A dummy URL lets the
        # lazy postgres client construct — no connection happens at build time.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-only-not-a-secret
        run: bun run build

      - name: vitest (node runtime)
        # The suite is vitest. It MUST run under NODE, not bun: `bun test` uses
        # bun's native runner, and even `bun run test` executes the vitest binary
        # on bun's runtime — both mishandle vitest's node:fs mocks and the
        # better-sqlite3 native binding (node-ABI), yielding spurious failures
        # (e.g. tests/bridge/github.test.ts) that all pass under node (338/338).
        # Rebuild the addon for the runner's node, then run vitest via node.
        # This is a REAL gate: a failing test fails the job (verified green in
        # run 28214862472 before continue-on-error was dropped).
        run: |
          npm rebuild better-sqlite3
          npx vitest run
