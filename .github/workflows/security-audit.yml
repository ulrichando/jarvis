name: security-audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Monday 14:00 UTC — catches CVEs disclosed over the weekend
    - cron: '0 14 * * 1'

jobs:
  pip-audit:
    name: pip-audit (voice-agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      # PYSEC-2025-49 / CVE-2024-6345 affect setuptools install-time path
      # traversal during package install. Voice agent never invokes
      # `pip install` at runtime, and the setuptools<70 pin is required
      # for transitive `pkg_resources` consumers (langchain). Accepted.
      - run: pip-audit -r src/voice-agent/requirements.txt --strict --ignore-vuln PYSEC-2025-49 --ignore-vuln CVE-2024-6345

  npm-audit-cli:
    name: npm audit (cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      # Level=critical (not high) since 2026-06-11: the two remaining
      # HIGH findings are @opentelemetry/exporter-prometheus (+ sdk-node
      # depending on it) — GHSA-q7rr-3cgh-j5r3. The fix is a breaking
      # sdk-node 0.218 bump in a tree treated as a separate codebase,
      # and the exporter only listens when OTEL prometheus export is
      # explicitly enabled. Accepted + tracked in docs/decisions-pending.md;
      # restore --audit-level=high when the otel bump lands.
      - working-directory: src/cli
        run: npm audit --audit-level=critical

  npm-audit-web:
    name: npm audit (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - working-directory: src/web
        # Temporarily --audit-level=critical (mirrors the cli job): the only high
        # is PostCSS GHSA-qx2v-qp2m-jg93 (XSS in CSS Stringify) — a build-time dev
        # dependency whose fix is a breaking major bump. Restore =high after the
        # next dependency bump lands.
        run: npm audit --audit-level=critical

  cargo-audit:
    name: cargo-audit (tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --locked cargo-audit
      - working-directory: src/desktop-tauri/src-tauri
        run: cargo audit
