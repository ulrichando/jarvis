name: voice-agent-tests

# Runs the voice-agent pytest suite on every push/PR that touches
# src/voice-agent/**. Mirrors the local command used by /voice-tests:
#
#   cd src/voice-agent
#   .venv/bin/python -m pytest tests/ -q --durations=10
#
# No --ignore flags: test_github_subagent.py does NOT exist on this
# branch (was a ghost). The previous --ignore entries for
# test_browser_ext_contract.py and test_supervisor_vision.py were also
# ghosts (the files don't exist on disk).
# JARVIS_RUN_INTEGRATION is intentionally NOT set so live-dispatch
# integration tests (gated behind that env var) are skipped in CI.
#
# Secrets: not provided. Production-style env vars get DUMMY values
# so import-time validators don't reject the test process. The unit
# tests use mocks/fixtures and never hit the real upstream APIs.

on:
  push:
    branches: [main, master]
    paths:
      - "src/voice-agent/**"
      - ".github/workflows/voice-agent-tests.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/voice-agent/**"
      - ".github/workflows/voice-agent-tests.yml"

# Least-privilege default; jobs opt into more only if needed.
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (linux, python 3.13)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/voice-agent
    env:
      # Bootstrap values — the agent reads these at import time. Real
      # values aren't needed because no test makes a live SFU
      # connection (they use mocks for AgentSession). Setting these
      # prevents `os.environ["LIVEKIT_URL"]` style KeyErrors.
      LIVEKIT_URL: ws://127.0.0.1:7880
      LIVEKIT_API_KEY: ci-dummy-key
      LIVEKIT_API_SECRET: ci-dummy-secret
      GOOGLE_API_KEY: ci-dummy-google-key
      GROQ_API_KEY: ci-dummy-groq-key
      DEEPSEEK_API_KEY: ci-dummy-deepseek-key
      DISPLAY: ":0"
      JARVIS_GRAPH_DISABLED: "1"   # skip LangGraph slow-path init in CI
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/voice-agent/requirements.txt

      - name: Install voice-agent system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libsndfile1 \
            libportaudio2

      - name: pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements-test.txt pins pytest-timeout (hung-test kill)
          # and pytest-asyncio (without it async test bodies return a
          # coroutine and pass vacuously). Without this line CI
          # diverges from the local suite.
          pip install -r requirements-test.txt
          pip install pytest pytest-asyncio pytest-rerunfailures

      - name: Run pytest
        run: |
          # --durations=10 surfaces slow tests in normal runs.
          # --timeout=60 prevents one hung test from wedging the job.
          # No --ignore flags: test_github_subagent.py does not exist
          # (was a ghost). JARVIS_RUN_INTEGRATION is not set so
          # live-dispatch integration tests skip automatically.
          python -m pytest tests/ -q --durations=10 --timeout=60
