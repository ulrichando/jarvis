name: Build & Deploy JARVIS

on:
  push:
    branches: [master]

jobs:
  deploy:
    # Self-hosted runner ON Proxmox — builds and deploys locally, no registry needed
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/ulrichando/jarvis:latest .

      - name: Deploy (restart container with new image)
        run: |
          # Stop the container, replace its image, start again.
          # Using docker compose so volumes and env_file are preserved.
          docker stop jarvis-jarvis-1 2>/dev/null || true
          docker rm jarvis-jarvis-1 2>/dev/null || true
          cd /opt/jarvis
          docker compose up -d jarvis
          echo "Deployed at $(date)"
