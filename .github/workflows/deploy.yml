name: Build & Deploy JARVIS

on:
  push:
    branches: [master]

concurrency:
  group: deploy-jarvis
  cancel-in-progress: true

env:
  REGISTRY:    ghcr.io
  IMAGE:       ghcr.io/${{ github.repository_owner }}/jarvis
  BASE_IMAGE:  ghcr.io/${{ github.repository_owner }}/jarvis-base

jobs:
  # ── Rebuild base image only when dependencies change ─────────────────────────
  base:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push base image if changed
        run: |
          NEW_HASH=$(cat Dockerfile.base pyproject.toml | sha256sum | cut -c1-16)

          if docker manifest inspect $BASE_IMAGE:latest > /dev/null 2>&1; then
            OLD_HASH=$(docker inspect $BASE_IMAGE:latest \
              --format='{{index .Config.Labels "jarvis.base.hash"}}' 2>/dev/null || echo "")
            if [ "$NEW_HASH" = "$OLD_HASH" ]; then
              echo "Base image up to date (hash=$NEW_HASH) — skipping rebuild"
              exit 0
            fi
            echo "Base changed: $OLD_HASH → $NEW_HASH — rebuilding"
          else
            echo "Base image not found — building for first time (hash=$NEW_HASH)"
          fi

          DOCKER_BUILDKIT=1 docker build \
            --label "jarvis.base.hash=$NEW_HASH" \
            -f Dockerfile.base \
            -t $BASE_IMAGE:latest \
            .

          docker push $BASE_IMAGE:latest
          echo "Base pushed at $(date)"

  # ── Fast app build — copies code into base ────────────────────────────────────
  deploy:
    needs: base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)

          docker pull $BASE_IMAGE:latest

          DOCKER_BUILDKIT=1 docker build \
            --build-arg GIT_COMMIT="$GIT_COMMIT" \
            -t $IMAGE:latest \
            -t $IMAGE:$GIT_COMMIT \
            .

          docker push $IMAGE:latest
          docker push $IMAGE:$GIT_COMMIT
          echo "Pushed $IMAGE:$GIT_COMMIT at $(date)"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /opt/jarvis

            # Pull new image
            docker pull ${{ env.IMAGE }}:latest
            echo "Pull complete"

            # Canary start
            docker rm -f jarvis_canary 2>/dev/null || true
            docker run -d \
              --name jarvis_canary \
              --network jarvis_jarvis_net \
              --env-file .env \
              -e OLLAMA_HOST=${{ secrets.OLLAMA_HOST }} \
              -e JARVIS_NO_SANDBOX=1 \
              -e JARVIS_OWNER=ulrich \
              -e JARVIS_HOME=/data/.jarvis \
              -v jarvis_data:/data/.jarvis \
              -v $(pwd)/.env:/app/.env:ro \
              --restart no \
              ${{ env.IMAGE }}:latest
            echo "Canary started"

            # Wait for canary health
            HEALTHY=0
            for i in $(seq 1 120); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' jarvis_canary 2>/dev/null || echo "missing")
              if [ "$STATUS" = "healthy" ]; then
                echo "Canary healthy after ${i}s"
                HEALTHY=1
                break
              elif [ "$STATUS" = "unhealthy" ]; then
                docker logs --tail=40 jarvis_canary 2>&1 || true
                docker rm -f jarvis_canary 2>/dev/null || true
                echo "Canary unhealthy — rollback"
                exit 1
              fi
              echo "  ${i}s: $STATUS"
              sleep 1
            done
            [ "$HEALTHY" = "0" ] && { docker rm -f jarvis_canary 2>/dev/null; exit 1; }

            # Swap canary → live (zero downtime)
            printf '# auto-generated\nupstream jarvis_active {\n    server jarvis_canary:8765;\n}\n' \
              > nginx/conf.d/upstream.conf
            docker compose exec -T nginx nginx -s reload
            echo "nginx → canary"
            sleep 2

            docker compose stop jarvis 2>/dev/null || true
            docker compose rm -f jarvis 2>/dev/null || true
            docker compose up -d jarvis

            for i in $(seq 1 120); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' jarvis-jarvis-1 2>/dev/null || echo "missing")
              [ "$STATUS" = "healthy" ] && { echo "Live healthy after ${i}s"; break; }
              [ "$STATUS" = "unhealthy" ] && { docker logs --tail=30 jarvis-jarvis-1 2>&1; exit 1; }
              echo "  ${i}s: $STATUS"
              sleep 1
            done

            printf '# auto-generated\nupstream jarvis_active {\n    server jarvis:8765;\n}\n' \
              > nginx/conf.d/upstream.conf
            docker compose exec -T nginx nginx -s reload
            docker rm -f jarvis_canary 2>/dev/null || true
            echo "Swap complete"

      - name: Final health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            for i in $(seq 1 30); do
              curl -sf http://localhost/api/ready > /dev/null 2>&1 && \
                echo "JARVIS healthy via nginx (${i}s)" && exit 0
              sleep 1
            done
            docker logs --tail=40 jarvis-jarvis-1 2>&1 || true
            exit 1
