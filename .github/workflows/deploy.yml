name: Build & Deploy JARVIS

on:
  push:
    branches: [master]

concurrency:
  group: deploy-jarvis
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner ON Proxmox — builds image here, deploys into CT104 (Docker host)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          # Embed commit hash so /api/version works inside the container
          GIT_COMMIT=$(git rev-parse --short HEAD)
          # Tag as the name docker-compose.yml expects on CT104
          docker build --build-arg GIT_COMMIT="$GIT_COMMIT" -t ghcr.io/ulrichando/jarvis:latest .

      - name: Transfer image to CT104 and deploy
        run: |
          # Pipe image directly into CT104 (no registry needed)
          docker save ghcr.io/ulrichando/jarvis:latest | /usr/sbin/pct exec 104 -- docker load

          # Force-recreate so the new image is actually used (not the cached container)
          /usr/sbin/pct exec 104 -- bash -c "cd /opt/jarvis && docker compose up -d --force-recreate --no-deps jarvis"
          echo "Deployed at $(date)"

      - name: Health check
        run: |
          echo "Waiting for JARVIS to be ready..."
          for i in $(seq 1 90); do
            if /usr/sbin/pct exec 104 -- curl -sf http://localhost:8765/api/ready > /dev/null 2>&1; then
              echo "JARVIS is healthy (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "JARVIS did not come up in 90s — last logs:"
          /usr/sbin/pct exec 104 -- docker logs --tail=30 jarvis-jarvis-1
          exit 1
