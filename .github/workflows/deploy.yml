name: Build & Deploy JARVIS

on:
  push:
    branches: [master]

concurrency:
  group: deploy-jarvis
  cancel-in-progress: false

jobs:
  deploy:
    # Self-hosted runner ON Proxmox — builds image here, deploys into CT104 (Docker host)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          docker build --build-arg GIT_COMMIT="$GIT_COMMIT" \
            -t ghcr.io/ulrichando/jarvis:latest \
            -t ghcr.io/ulrichando/jarvis:$GIT_COMMIT \
            .

      # ── Push to GHCR (only changed layers go over the wire) ──────────────────
      - name: Push image to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" \
            | docker login ghcr.io -u ulrichando --password-stdin
          docker push ghcr.io/ulrichando/jarvis:latest
          docker push ghcr.io/ulrichando/jarvis:$(git rev-parse --short HEAD)
          echo "Pushed at $(date)"

      # ── Zero-downtime canary deploy ──────────────────────────────────────────
      # Strategy:
      #   1. CT104 pulls from GHCR — only changed layers downloaded (fast)
      #   2. Start jarvis_canary (new image) alongside the live jarvis container
      #   3. Wait for canary to pass its health check
      #   4. nginx reload → traffic instantly switches to canary (no dropped requests)
      #   5. Remove old jarvis container; rename canary → jarvis
      #   6. Rollback automatically if canary never becomes healthy

      - name: Pull new image on CT104
        run: |
          # Log CT104 into GHCR, then pull — only changed layers are downloaded
          echo "${{ secrets.GHCR_TOKEN }}" \
            | /usr/sbin/pct exec 104 -- docker login ghcr.io -u ulrichando --password-stdin
          /usr/sbin/pct exec 104 -- docker pull ghcr.io/ulrichando/jarvis:latest
          echo "Pull complete at $(date)"

      - name: Start canary container
        run: |
          /usr/sbin/pct exec 104 -- bash -c "
            set -e
            cd /opt/jarvis

            # Remove any leftover canary from a previous failed deploy
            docker rm -f jarvis_canary 2>/dev/null || true

            # Start canary on the same internal network — no host port needed
            docker run -d \
              --name jarvis_canary \
              --network jarvis_jarvis_net \
              --env-file .env \
              -e OLLAMA_HOST=http://ollama:11434 \
              -e JARVIS_NO_SANDBOX=1 \
              -e JARVIS_OWNER=ulrich \
              -e JARVIS_HOME=/data/.jarvis \
              -v jarvis_data:/data/.jarvis \
              -v \$(pwd)/.env:/app/.env:ro \
              -v /root/.ssh/jarvis_to_kali:/data/.ssh/jarvis_to_kali:ro \
              -v /root/.ssh/known_hosts:/data/.ssh/known_hosts:rw \
              --restart no \
              ghcr.io/ulrichando/jarvis:latest

            echo 'Canary started'
          "

      - name: Wait for canary to be healthy
        run: |
          echo "Waiting for canary to pass health check..."
          HEALTHY=0
          for i in $(seq 1 120); do
            STATUS=$(/usr/sbin/pct exec 104 -- docker inspect \
              --format='{{.State.Health.Status}}' jarvis_canary 2>/dev/null || echo "missing")
            if [ "$STATUS" = "healthy" ]; then
              echo "Canary healthy after ${i}s"
              HEALTHY=1
              break
            elif [ "$STATUS" = "unhealthy" ]; then
              echo "Canary is unhealthy — rolling back"
              /usr/sbin/pct exec 104 -- docker rm -f jarvis_canary 2>/dev/null || true
              exit 1
            fi
            echo "  ${i}s: $STATUS"
            sleep 1
          done
          if [ "$HEALTHY" = "0" ]; then
            echo "Canary did not become healthy in 120s — rolling back"
            /usr/sbin/pct exec 104 -- bash -c "
              docker logs --tail=40 jarvis_canary 2>&1 || true
              docker rm -f jarvis_canary 2>/dev/null || true
            "
            exit 1
          fi

      - name: Swap canary → live (nginx hot-reload, zero downtime)
        run: |
          /usr/sbin/pct exec 104 -- bash -c "
            set -e
            cd /opt/jarvis

            # Point nginx upstream at the canary
            printf '# Managed by deploy workflow — do not edit by hand.\nupstream jarvis_active {\n    server jarvis_canary:8765;\n}\n' \
              > nginx/conf.d/upstream.conf

            # nginx -s reload is graceful: existing connections finish on old upstream,
            # new connections go to canary — zero dropped requests
            docker compose exec -T nginx nginx -s reload
            echo 'nginx reloaded → traffic now on canary'

            # Give nginx a moment to finish draining old connections
            sleep 3

            # Stop and remove the old live container
            docker compose stop jarvis 2>/dev/null || true
            docker compose rm -f jarvis 2>/dev/null || true

            # Rename canary to the canonical service name so compose is consistent
            docker rename jarvis_canary jarvis-jarvis-1

            # Restore upstream.conf to point at the standard service name
            printf '# Managed by deploy workflow — do not edit by hand.\nupstream jarvis_active {\n    server jarvis:8765;\n}\n' \
              > nginx/conf.d/upstream.conf

            # Bring compose back in sync: registers the renamed container as the
            # managed 'jarvis' service without recreating it
            docker compose up -d --no-recreate jarvis

            echo 'Swap complete — JARVIS is live on new image'
          "

      - name: Final health check
        run: |
          echo "Verifying live service after swap..."
          for i in $(seq 1 30); do
            if /usr/sbin/pct exec 104 -- curl -sf http://localhost/api/ready > /dev/null 2>&1; then
              echo "JARVIS healthy via nginx (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "Post-swap health check failed — dumping logs:"
          /usr/sbin/pct exec 104 -- docker logs --tail=40 jarvis-jarvis-1 2>&1 || true
          exit 1
