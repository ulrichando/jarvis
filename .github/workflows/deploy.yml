name: Build & Deploy JARVIS

on:
  push:
    branches: [master]

jobs:
  deploy:
    # Self-hosted runner ON Proxmox — builds image here, deploys into CT104 (Docker host)
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t git.0wlan.com/ulrich/jarvis:latest .

      - name: Transfer image to CT104 and deploy
        run: |
          # Pipe image directly into CT104 (no registry needed)
          docker save git.0wlan.com/ulrich/jarvis:latest | /usr/sbin/pct exec 104 -- docker load

          # Restart the jarvis service inside CT104
          /usr/sbin/pct exec 104 -- bash -c "cd /opt/jarvis && docker compose up -d jarvis"
          echo "Deployed at $(date)"

      - name: Health check
        run: |
          sleep 10
          /usr/sbin/pct exec 104 -- curl -sf http://localhost:8765/api/ready && echo "JARVIS is healthy"
