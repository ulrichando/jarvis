name: stale

# Marks long-idle issues/PRs stale, then closes if still untouched. Daily.
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    name: mark stale
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "Idle for 60 days — marking stale. Comment to keep it open; otherwise it closes in 14 days."
          stale-pr-message: "Idle for 60 days — marking stale. Push or comment to keep it open; otherwise it closes in 14 days."
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,roadmap
          exempt-pr-labels: pinned,security
          operations-per-run: 60
