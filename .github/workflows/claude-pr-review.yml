name: Claude PR Review

# Auto-reviews every same-repo PR against CLAUDE.md + the regression-prevention
# rules, posting inline comments. JARVIS's #1 pain is cross-tree regressions
# (voice-agent / desktop-tauri / web / cli share state), so the prompt leans
# hard there. Same-repo PRs only — fork PRs get no secrets on a public repo by
# design, and we don't run a key-bearing review on untrusted code. Own branches
# + evolution-loop PRs are same-repo, so they're covered.
#
# BRIDGE (Path A): stock claude-code-action until JARVIS's CLI runner (Path B)
# takes over — only the `uses:` step swaps; triggers + gate + prompt stay.
#
# DORMANT until the key exists:  gh secret set ANTHROPIC_API_KEY

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # No id-token: write — direct API key auth, not OIDC/WIF (least privilege).
    steps:
      - name: Gate on API key (dormant until ANTHROPIC_API_KEY is set)
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY not set — JARVIS PR review is dormant; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Claude PR review
        if: steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@e9072dc659c8b408d9df95ab08cfd8bf7acce9d8 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          # Only trusted context is interpolated here (repo slug + PR number);
          # the PR title/body/diff are read by the action's own tools, never
          # injected as text — avoids workflow prompt-injection.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR as a JARVIS maintainer. Read CLAUDE.md and
            .claude/rules/regression-prevention.md first, then hold the diff to them.

            Priorities, in order:
            1. Cross-tree regressions. JARVIS has 4 subtrees (voice-agent,
               desktop-tauri, web, cli) that share state via shell paths, the
               bridge (127.0.0.1:8765), and systemd --user services. Flag any
               change in one tree that could break another — grep callers across
               ALL trees (incl. bin/, setup/, scripts/), not just the edited one.
            2. Load-bearing constraints from CLAUDE.md: the sanitizers /
               monkey-patches, the supervisor tool gate, the min_words=0 barge-in
               baseline, restart safety, and the auto-mod HARD_BLOCKLIST. Flag any
               edit that touches them.
            3. Correctness + security: error handling, input validation at trust
               boundaries, injection, and secrets (no keys in tracked files).
            4. Verification: does the change carry the check it needs (pytest /
               vitest / build), per the regression-prevention "verify before done"?

            Post inline comments for specific issues and ONE top-level summary with
            a clear verdict. Be terse — no praise padding. If you propose a commit,
            do NOT add Co-Authored-By trailers or any AI attribution.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
