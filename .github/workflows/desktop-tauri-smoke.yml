name: desktop-tauri-smoke

# Catches the documented build-flow gotcha for `src/voice-agent/desktop-tauri/`:
# "npm run build alone does NOT ship JS changes. You must
#  cargo build --release afterward to re-embed dist/ into the binary."
# Pre-2026-05-08 nothing in CI verified that the dist + binary stay
# consistent. This workflow runs both halves of the release flow on
# every push touching the desktop tree.

on:
  push:
    branches: [main, master]
    paths:
      - "src/voice-agent/desktop-tauri/**"
      - ".github/workflows/desktop-tauri-smoke.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/voice-agent/desktop-tauri/**"
      - ".github/workflows/desktop-tauri-smoke.yml"

jobs:
  build-smoke:
    name: build-smoke (linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/voice-agent/desktop-tauri
    steps:
      - uses: actions/checkout@v6

      - name: Install Tauri 2 system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            pkg-config

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/voice-agent/desktop-tauri/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/voice-agent/desktop-tauri/src-tauri
          shared-key: desktop-tauri-smoke

      - name: npm ci
        run: npm ci

      - name: npm run build (vite → dist/)
        run: npm run build

      - name: Verify dist/ exists + non-empty
        run: |
          test -d dist
          test -s dist/index.html
          test "$(find dist/assets -name 'index-*.js' | wc -l)" -ge 1

      - name: cargo check (Rust + dist embed)
        working-directory: src/voice-agent/desktop-tauri/src-tauri
        run: cargo check --locked

      # cargo test is gated — run only if any test modules exist, so
      # this workflow doesn't fail on an empty test surface today and
      # auto-activates the moment someone adds the first #[cfg(test)].
      - name: cargo test (if any test modules)
        working-directory: src/voice-agent/desktop-tauri/src-tauri
        run: |
          if grep -rqE '#\[cfg\(test\)\]|#\[test\]' src/; then
            cargo test --locked
          else
            echo "No test modules found — skipping cargo test."
          fi
