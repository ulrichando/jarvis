name: cd-web-image

# On a published Release (release-please cuts these on merge of its release PR):
# build the web image, Trivy-scan it (results → Security tab), and publish to
# GHCR tagged with the version + short SHA. Publish-only — no auto-deploy to a
# host; the runbook (docs/runbook/deploy-online.md) pulls the tagged image.
# workflow_dispatch lets you build/push on demand.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    name: build + scan + push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
      security-events: write   # upload the Trivy image SARIF
    env:
      IMAGE: ghcr.io/ulrichando/jarvis-web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build (load locally to scan before publishing)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src/web
          file: src/web/Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan the image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload image scan to the Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push (cached — reuses the build above)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: src/web
          file: src/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
