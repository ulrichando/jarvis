# Force ACP (alsa-card-profile) to auto-pick the best matching profile
# and auto-port for every alsa_card. Some hardware ships with these
# off, which hides the combined `output:analog-stereo+input:analog-stereo`
# profile and forces apps onto `pro-audio` (which then grabs the raw
# hw: device exclusively, blocking other apps from sharing the mic).
#
# Live failure on this codebase 2026-05-15: Dell Latitude 7480 with
# Realtek ALC256/ALC3246. After deploying this rule, the "Analog
# Stereo Duplex" profile appeared and every app gets a normal shared
# analog source.
#
# No-op on hardware that already has the combined profile via UCM.
# Safe to ship by default.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.*" }
    ]
    actions = {
      update-props = {
        api.acp.auto-profile = true
        api.acp.auto-port    = true
      }
    }
  }
]
