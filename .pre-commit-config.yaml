# Local fast pre-commit gate. Opt-in per clone:  pip install pre-commit && pre-commit install
# Detect-only (no auto-rewrite) so it never surprises you with code changes.
# Shifts the server-side push protection + gitleaks CI left to before the commit.
# Renovate keeps these `rev`s fresh.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ["--unsafe"]   # GitHub Actions YAML uses tags check-yaml can't construct
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=5000"]   # blocks the 50MB+ build-artifact commits GitHub warns about

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
